<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 Futures Widget</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --blue: #388bfd; --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px; line-height: 1.4; min-width: 360px;
  }

  /* ── Header ── */
  #hdr {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
  }
  #hdr .title { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
  #hdr .meta  { color: var(--muted); font-size: 11px; text-align: right; }
  #hdr .dot   { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
                background: var(--green); margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Alert bar ── */
  #alert-bar {
    padding: 7px 14px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  #alert-bar.warn   { background: #2d1e00; color: var(--yellow); border-left: 3px solid var(--yellow); }
  #alert-bar.good   { background: #0d2018; color: var(--green);  border-left: 3px solid var(--green); }
  #alert-bar.quiet  { background: var(--surface2); color: var(--muted); border-left: 3px solid var(--border); }

  /* ── Markets table ── */
  #markets-wrap { padding: 10px 14px 6px; }
  #markets-wrap h3 { font-size: 10px; color: var(--muted); letter-spacing: 0.08em;
                     text-transform: uppercase; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase;
       letter-spacing: 0.05em; padding: 3px 6px 5px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 5px 6px; border-bottom: 1px solid #1c2128; font-size: 12px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .asset-name { font-weight: 600; color: var(--text); }
  .price-col  { font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text); font-size: 11.5px; }
  .up   { color: var(--green); font-size: 15px; font-weight: 700; }
  .down { color: var(--red);   font-size: 15px; font-weight: 700; }
  .flat { color: var(--muted); font-size: 15px; font-weight: 700; }
  .levels { color: var(--muted); font-size: 10px; line-height: 1.6; }

  /* ── Phase strip ── */
  #phase-wrap { padding: 8px 14px 10px; border-top: 1px solid var(--border); }
  #phase-wrap h3 { font-size: 10px; color: var(--muted); letter-spacing: 0.08em;
                   text-transform: uppercase; margin-bottom: 7px; }
  .phases { display: flex; flex-wrap: wrap; gap: 6px; }
  .phase-pill {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 8px; font-size: 11px;
  }
  .phase-pill .name { font-weight: 700; }
  .badge {
    font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .badge-accum  { background:#0d2018; color:var(--green); }
  .badge-manip  { background:#2d1e00; color:var(--yellow); }
  .badge-dist   { background:#2d0f0f; color:var(--red); }
  .badge-reaccum{ background:#0d1a2d; color:var(--blue); }

  /* ── Footer ── */
  #footer {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 8px 14px; display: flex; justify-content: space-between; align-items: center;
  }
  #footer .ts  { color: var(--muted); font-size: 10px; }
  #footer a    { color: var(--blue); font-size: 11px; text-decoration: none; font-weight: 600; }
  #footer a:hover { text-decoration: underline; }

  /* ── Error / loading ── */
  .loading { text-align: center; color: var(--muted); padding: 30px; font-size: 13px; }
  .error   { text-align: center; color: var(--red); padding: 20px; font-size: 12px; }
</style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <div class="title"><span class="dot"></span>📈 FUTURES WIDGET</div>
  <div class="meta" id="hdr-date">Loading…</div>
</div>

<!-- Alert banner -->
<div id="alert-bar" class="quiet">LOADING…</div>

<!-- Market snapshot -->
<div id="markets-wrap">
  <h3>Market Snapshot</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Close</th>
        <th></th><!-- bias arrow -->
        <th>Key Levels</th>
      </tr>
    </thead>
    <tbody id="markets-body">
      <tr><td colspan="4" class="loading">Fetching latest report…</td></tr>
    </tbody>
  </table>
</div>

<!-- Phase assessments -->
<div id="phase-wrap">
  <h3>ICT Phase</h3>
  <div class="phases" id="phases">
    <span style="color:var(--muted)">Loading…</span>
  </div>
</div>

<!-- Footer -->
<div id="footer">
  <span class="ts" id="ts">—</span>
  <a id="report-link" href="index.html" target="_blank">Full Report →</a>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const REPORT = './index.html';
  const REFRESH_MS = 5 * 60 * 1000; // 5 minutes

  // Phase badge class mapping (keyword → CSS class)
  const PHASE_MAP = {
    'accumulation':    'badge-accum',
    'manipulation':    'badge-manip',
    'distribution':    'badge-dist',
    're-accumulation': 'badge-reaccum',
    'reaccumulation':  'badge-reaccum',
  };

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function getBiasClass(cell) {
    if (!cell) return 'flat';
    const cls = cell.className || '';
    if (cls.includes('up'))   return 'up';
    if (cls.includes('down')) return 'down';
    return 'flat';
  }

  function phaseClass(label) {
    const key = label.toLowerCase().replace(/[- ]/g, '');
    for (const [k, v] of Object.entries(PHASE_MAP)) {
      if (key.includes(k.replace('-', ''))) return v;
    }
    return 'badge-accum';
  }

  function shortAsset(name) {
    // Shorten long asset names for the compact table
    return name
      .replace('(Nasdaq-100 fut.)', '')
      .replace('(S&P 500 fut.)', '')
      .replace('Crude', '')
      .trim();
  }

  // ── Main load ───────────────────────────────────────────────────────────────
  async function load() {
    try {
      const resp = await fetch(REPORT + '?t=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const html = await resp.text();
      const doc  = new DOMParser().parseFromString(html, 'text/html');

      renderDate(doc);
      renderAlert(doc);
      renderMarkets(doc);
      renderPhases(doc);
      renderReportLink(doc);

      document.getElementById('ts').textContent =
        'Refreshed ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    } catch (err) {
      document.getElementById('markets-body').innerHTML =
        '<tr><td colspan="4" class="error">⚠ Could not load report<br><small>' + err.message + '</small></td></tr>';
      document.getElementById('ts').textContent = 'Load failed';
    }
  }

  // ── Render helpers ──────────────────────────────────────────────────────────
  function renderDate(doc) {
    const title = doc.querySelector('title');
    if (!title) return;
    // e.g. "Daily Futures Trading Report — July 1, 2026 (EOD)"
    const match = title.textContent.match(/—\s*(.+)/);
    document.getElementById('hdr-date').textContent = match ? match[1].trim() : title.textContent;
  }

  function renderAlert(doc) {
    const tag = doc.querySelector('#alert .tag');
    const bar = document.getElementById('alert-bar');
    if (!tag) { bar.textContent = 'No alert data'; return; }

    const text = tag.textContent.trim();
    bar.textContent = text;
    bar.className = '';
    if (text.includes('FLIP') || text.includes('RISK')) {
      bar.classList.add('warn');
    } else if (text.includes('CONFIRMED') || text.includes('HOLDS')) {
      bar.classList.add('good');
    } else {
      bar.classList.add('quiet');
    }
  }

  function renderMarkets(doc) {
    const rows = doc.querySelectorAll('#snapshot table tr');
    const tbody = document.getElementById('markets-body');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="4" class="error">No snapshot data</td></tr>'; return; }

    let html = '';
    rows.forEach((row, i) => {
      if (i === 0) return; // skip header
      const cells = row.querySelectorAll('td');
      if (cells.length < 4) return;

      const asset  = shortAsset(cells[0].textContent.trim());
      const price  = cells[1].textContent.trim();
      const biasCell = cells[3];
      const biasClass = getBiasClass(biasCell);
      const biasText  = biasCell ? biasCell.textContent.trim() : '→';
      const levels = cells[4] ? cells[4].textContent.trim() : '';

      html += `
        <tr>
          <td class="asset-name">${asset}</td>
          <td class="price-col">${price}</td>
          <td class="${biasClass}">${biasText}</td>
          <td class="levels">${levels}</td>
        </tr>`;
    });
    tbody.innerHTML = html || '<tr><td colspan="4" class="error">No data</td></tr>';
  }

  function renderPhases(doc) {
    const cards = doc.querySelectorAll('#phase .card');
    const wrap  = document.getElementById('phases');
    if (!cards.length) { wrap.innerHTML = '<span style="color:var(--muted)">No phase data</span>'; return; }

    let html = '';
    cards.forEach(card => {
      const h4    = card.querySelector('h4');
      const badge = card.querySelector('.badge');
      if (!h4 || !badge) return;

      // Short name: just the ticker (before the —)
      const fullName   = h4.textContent.trim();
      const ticker     = fullName.split('—')[0].replace('–', '').trim();
      const phaseLabel = badge.textContent.trim();
      const cls        = phaseClass(phaseLabel);

      html += `
        <div class="phase-pill">
          <span class="name">${ticker}</span>
          <span class="badge ${cls}">${phaseLabel}</span>
        </div>`;
    });
    wrap.innerHTML = html || '<span style="color:var(--muted)">No phase data</span>';
  }

  function renderReportLink(doc) {
    // Point the "Full Report" link to the actual deployed URL if we can infer it
    const link = document.getElementById('report-link');
    link.href = location.href.replace('widget.html', 'index.html');
  }

  // ── Boot ────────────────────────────────────────────────────────────────────
  load();
  setInterval(load, REFRESH_MS);
</script>
</body>
</html>
